services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: radarpolska
      POSTGRES_USER: radarpolska
      POSTGRES_PASSWORD: radarpolska
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radarpolska -d radarpolska"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
